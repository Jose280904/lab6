<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunrise & Sunset Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <h1>Sunrise & Sunset Dashboard</h1>
    </header>

    <main>

        <section class="search-selesction">
            <h2>Find Location</h2>

            <select id="locationSelect">
                <option value="">Select a location</option>
                <option value="41.8781,-87.6298">Chicago</option>
                <option value="34.0522,-118.2437">Los Angeles</option>
                <option value="40.7128,-74.0060">New York</option>
                <option value="29.7604,-95.3698">Houston</option>
                <option value="25.7617,-80.1918">Miami</option>
                <option value="47.6062,-122.3321">Seattle</option>
                <option value="39.7392,-104.9903">Denver</option>
                <option value="33.4484,-112.0740">Phoenix</option>
                <option value="32.7157,-117.1611">San Diego</option>
                <option value="38.9072,-77.0369">Washington DC</option>
            </select>
            <button id="getDataBtn">Get Data</button>
        </section>

        <section class="results">
            <div class="card" id="today">
                <h3>Today</h3>
                <p>Sunrise: <span id="today-sunrise">--</span></p>
                <p>Sunset: <span id="today-sunset">--</span></p>
                <p>Dawn: <span id="today-dawn">--</span></p>
                <p>Dusk: <span id="today-dusk">--</span></p>
                <p>Solar Noon: <span id="today-noon">--</span></p>
                <p>Day Length: <span id="today-length">--</span></p>
                <p>Time Zone: <span id="today-timezone">--</span></p>
                </div>

            <div class="card" id="tomorrow">
                <h3>Tomorrow</h3>
                <p>Sunrise: <span id="tomorrow-sunrise">--</span></p>
                <p>Sunset: <span id="tomorrow-sunset">--</span></p>
                <p>Dawn: <span id="tomorrow-dawn">--</span></p>
                <p>Dusk: <span id="tomorrow-dusk">--</span></p>
                <p>Solar Noon: <span id="tomorrow-noon">--</span></p>
                <p>Day Length: <span id="tomorrow-length">--</span></p>
                <p>Time Zone: <span id="tomorrow-timezone">--</span></p>
            </div>
        </section>
    </main>

    <footer>
        <p>Data from SunriseSunset.io</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
